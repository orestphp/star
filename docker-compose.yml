version: '3.8'

volumes:
  db-data:

networks:
  star-network:
    driver: bridge

services:
  # PHP (Nette API backend)
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./api:/var/www/star/api
    networks:
      - star-network

  # Node container for running frontend/asset tasks
  node:
    image: node:22-bookworm-slim
    volumes:
      - ./api:/var/www/star/api
    working_dir: /var/www/star/api
    profiles: ["cli"]
    networks:
      - star-network

  # Nginx Web Server
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - '8080:80'
      - '8082:8082'
    volumes:
      - ./api:/var/www/star/api
      - ./frontend:/var/www/star/frontend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - star-network

  # MySQL Database
  db:
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
      args:
        MYSQL_DATABASE: star
        MYSQL_USER: user
        MYSQL_PASSWORD: user
        MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - star-network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pma
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    restart: always
    ports:
      - 8081:80
    depends_on:
      - db
    networks:
      - star-network